name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:    # allow manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Generate temporary keystore
        working-directory: ./android
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias demo \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass demo123 -keypass demo123 \
            -dname "CN=Baseras Demo,OU=FieldPharma,O=Baseras,L=Mumbai,ST=MH,C=IN"

      - name: Build release APK
        working-directory: ./android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          KEYSTORE_PASSWORD: demo123
          KEY_ALIAS: demo
          KEY_PASSWORD: demo123
        run: gradle :app:assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fieldpharma-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
